<svg viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg" fill="none">
  <!-- Warm amber rounded background -->
  <rect width="40" height="40" rx="10" fill="#C8702A"/>
  <!-- Subtle inner highlight for depth -->
  <rect width="40" height="40" rx="10" fill="url(#grad)"/>
  <!-- ₹ symbol in cream -->
  <text x="4" y="29" font-family="Georgia, serif" font-size="26" font-weight="700" fill="#FAF8F4">₹</text>
  <!-- Upward shift arrow in lighter cream -->
  <path d="M26 8 L33 8 L33 15" stroke="#FAF8F4" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <path d="M33 8 L24 17" stroke="#FAF8F4" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="40" y2="40" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E07830" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#A85A20" stop-opacity="0.3"/>
    </linearGradient>
  </defs>
</svg>